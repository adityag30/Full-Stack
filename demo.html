<!DOCTYPE html> 
<html> 
<head> 
    <title>COURSE REGISTRATION FORM</title> 
    <style> 
        body { 
            background-color: rgb(194, 229, 241); 
            font-family: Arial; 
            margin: 0; 
            padding: 20px; 
        } 
        .header { 
            text-align: center; 
            margin-bottom: 20px; 
        } 
        .header h1 { 
            margin: 0 0 10px 0; 
            font-size: 2em; 
            color: black; 
            text-align: center; 
        } 
        .logo { 
            width: 200px; 
            height: auto; 
        } 
        marquee { 
            font-size: 18px; 
            font-weight: bold; 
            color:black; 
        } 
        form { 
            max-width: 600px; 
            margin: 0 auto; 
            background-color:whitesmoke; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1); 
        } 
        label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: bold; 
        } 
        input, select { 
            width: 100%; 
            padding: 8px; 
            margin-bottom: 15px; 
            border: 2px solid black; 
            border-radius: 4px; 
            box-sizing: border-box; 
        } 
        input:valid { 
            border-color: green; 
        } 
        input:invalid { 
            border-color: red; 
        } 
        select:valid { 
            border-color: green; 
        } 
        select:invalid { 
            border-color: red; 
        } 
        .radio-group { 
            margin-bottom: 15px; 
        } 
        .radio-group label { 
            display: inline; 
            margin-right: 10px; 
            font-weight: normal; 
        } 
        button { 
            background-color:rgb(21, 88, 21); 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            margin-right: 10px; 
        } 
        button[type="reset"] { 
            background-color: rgb(138, 9, 9); 
        } 
        button:hover { 
            opacity: 0.8; 
        } 
    </style> 
</head> 
<body> 
    <div class="header"> 
        <h1>Course Registration</h1> 
        <img src="clglogo.png" alt="College Logo" class="logo"> 
        <p class="info-text"><b>Welcome to Graphic Era Deemed to be University, Dehradun</b></p> 
        <p class="info-text"><b>Complete registration before 25th January 2026</b></p> 
    </div> 
    <form action="thankyou.html" method="post" autocomplete="off" target="_blank"> 
        <label for="name">Student Name (3-30 characters):</label> 
        <input type="text" id="name" name="name" required minlength="3" maxlength="30"> 
        <label for="email">University Email ID (must end with @geu.ac.in):</label> 
        <input type="email" id="email" name="email" required pattern="^[a-zA-Z0-9]+@geu\.ac\.in$"> 
        <label for="usn">USN/Roll Number (e.g., AB12CDE):</label> 
        <input type="text" id="usn" name="usn" required pattern="[A-Z]{2}\d{2}[A-Z]{3}" title="Format: 2 
uppercase letters, 2 digits, 3 uppercase letters"> 
        <label for="course">Select Course:</label> 
        <select id="course" name="course" required> 
            <option value="">--Select a Course--</option> 
            <option value="Computer Science">Computer Science</option> 
            <option value="Information Technology">Information Technology</option> 
            <option value="Mechanical Engineering">Mechanical Engineering</option> 
            <option value="Electrical Engineering">Electrical Engineering</option> 
            <option value="Civil Engineering">Civil Engineering</option> 
        </select> 
        <label for="age">Age (18-30):</label> 
        <input type="number" id="age" name="age" required min="18" max="30"> 
        <div class="radio-group"> 
            <label><b>Gender:</b></label><br> 
            <input type="radio" id="male" name="gender" value="Male" required> 
            <label for="male">Male</label> 
            <input type="radio" id="female" name="gender" value="Female" required> 
            <label for="female">Female</label> 
            <input type="radio" id="other" name="gender" value="Other" required> 
            <label for="other">Other</label> 
        </div> 
        <button type="submit">Submit</button> 
        <button type="reset">Reset</button> 
    </form> 
</body> 
</html>
