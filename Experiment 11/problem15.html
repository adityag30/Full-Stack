<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center; /* horizontal center */
            align-items: center;     /* vertical center */
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
            width: 250px;
        }
        h1 {
            font-size: 40px;
            margin: 20px 0;
        }
        button {
            margin: 5px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>StopWatch</h2>
        <h1 id="time"><i>0</i></h1>
        <button onclick="start()">Start</button>
        <button onclick="pause()">Pause</button>
        <button onclick="reset()">Reset</button>
    </div> 
    <script>
        let seconds = 0 ;
        let timer;
        function start(){
            timer = setInterval(updateTime,1000);
        }
        function updateTime(){
            seconds++;
            document.getElementById("time").innerHTML = "<i>" + seconds + "</i>";
        }
        function pause(){
            clearInterval(timer);
        }
        function reset(){
            clearInterval(timer);
            seconds =0; 
            document.getElementById("time").innerHTML = "<i>" + seconds + "</i>";
        }
    </script>
</body>
</html>
