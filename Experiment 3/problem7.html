<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <style>
        body{
            background-color: azure;
        }
        form{
            width:600px ;
            background-color:antiquewhite;
            padding:30px;
            text-align:justify;
            margin:0 auto;
        }
        input:invalid{
            border: 2px solid red;
        }
        input:valid{
            border: 2px solid green;
        }
        input[type=submit]:hover{
            background-color: green;
            border-color: black;
        }
        input[type=reset]:hover{
            background-color:red;
            border-color: black;
        }
        input[type=submit],input[type=reset]{
            width:150px;
            height:50px;
            border-radius:8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1 align="center"><u>Job Application Form</u></h1>
    <form action="thankyou.html" method="get" target="_blank">
        <label for="Name">Name :</label>
        <input type="text" id="Name" minlength="4" required><br><br>
        <label for="Email">Email ID :</label>
        <input type="email" id="Email" pattern="[A-Za-z0-9]*@gmail.com" required><br><br>
        <label for="Phone">Phone Number :</label>
        <input type="text" id="Phone" pattern="[0-9]{10}" required><br><br>
        <label for="Experience">Years of Experience :</label>
        <input type="number" id="Experience" min="0" max="30" step="1" required><br><br>
        <label for="Role">Job Role :</label>
        <select id="Course" title="Job Role" required>
            <option value="">-- Select Job Role --</option>
            <option value="SDE-I">SDE-I</option>
            <option value="SDE-II">SDE-II</option>
            <option value="SDE-III">SDE-III</option>
        </select><br><br>
        <label for="Technical Skills">Technical Skills :</label><br>
        <input type="checkbox" id="C/C++" value="Skills">C/C++
        <input type="checkbox" id="Java" value="Java" >Java
        <input type="checkbox" id="Python" value="Python" >Python
        <input type="checkbox" id="API" value="API" >API development<br><br>
        <label for="Cover Letter">Upload Cover Letter </label>
        <input type="file" id="cover_letter" ><br><br>
        <input type="submit" value="Submit">&nbsp;
        <input type="reset" value="Reset"> <br>
    </form>
</body>
</html>
